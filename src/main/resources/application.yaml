spring:
  application:
    name: aws_rds_product_app
  datasource:
    url: jdbc:mysql://product.czgq6yc4qr0o.ap-south-1.rds.amazonaws.com:3306/product_aws_rds_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: admin
    password: test1234
    driver-class-name: com.mysql.cj.jdbc.Driver
    
    # HikariCP Configuration
    hikari:
      pool-name: ProductHikariCP
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      max-lifetime: 1200000
      connection-timeout: 30000
      leak-detection-threshold: 60000
      
  jpa:
    hibernate:
      ddl-auto: update
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
        implicit-strategy: org.hibernate.boot.model.naming.ImplicitNamingStrategyJpaCompliantImpl
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        "[format_sql]": true

server:
  port: 8080